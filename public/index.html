<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Emirhan, Alikaan ve Aykan için günlük antrenman takip sistemi">
    <title>🏋️ Kuzenler Spor Takip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ─── Navigation ──────────────────────────────────── -->
    <nav class="nav">
        <div class="nav-brand">
            <span class="nav-icon">🏋️</span>
            <span class="nav-title">KUZENLER</span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="dashboard" onclick="switchTab('dashboard')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Dashboard
            </button>
            <button class="nav-tab" data-tab="workout" onclick="switchTab('workout')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                Antrenman
            </button>
            <button class="nav-tab" data-tab="history" onclick="switchTab('history')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Geçmiş
            </button>
        </div>
    </nav>

    <!-- ─── Dashboard Tab ───────────────────────────────── -->
    <main id="tab-dashboard" class="tab-content active">
        <!-- Leaderboard -->
        <section class="section">
            <h1 class="section-title">
                <span class="title-icon">🏆</span> Liderlik Tablosu
            </h1>
            <div id="leaderboard" class="leaderboard-grid">
                <!-- JS ile doldurulacak -->
            </div>
        </section>

        <!-- Bugünkü Antrenmanlar -->
        <section class="section">
            <h2 class="section-title">
                <span class="title-icon">📅</span> Bugünkü Antrenmanlar
            </h2>
            <div id="today-workouts" class="today-grid">
                <!-- JS ile doldurulacak -->
            </div>
        </section>

        <!-- Son Aktiviteler -->
        <section class="section">
            <h2 class="section-title">
                <span class="title-icon">⚡</span> Son Aktiviteler
            </h2>
            <div id="recent-activity" class="activity-feed">
                <!-- JS ile doldurulacak -->
            </div>
        </section>
    </main>

    <!-- ─── Workout Tab ─────────────────────────────────── -->
    <main id="tab-workout" class="tab-content">
        <section class="section">
            <h2 class="section-title">
                <span class="title-icon">💪</span> Antrenman Kaydet
            </h2>

            <div class="workout-form-container">
                <!-- Kullanıcı Seçimi -->
                <div class="form-group">
                    <label class="form-label">Kim antrenman yapıyor?</label>
                    <div id="user-select" class="user-select-grid">
                        <!-- JS ile doldurulacak -->
                    </div>
                </div>

                <!-- Egzersiz Seçimi -->
                <div class="form-group">
                    <label class="form-label">Egzersiz</label>
                    <div class="search-wrapper">
                        <input type="text" id="exercise-search" class="form-input" placeholder="Egzersiz ara... (ör: bench, squat)" autocomplete="off">
                        <div id="exercise-dropdown" class="exercise-dropdown hidden">
                            <!-- JS ile doldurulacak -->
                        </div>
                    </div>
                    <div id="selected-exercise" class="selected-exercise hidden">
                        <!-- Seçilen egzersiz -->
                    </div>
                </div>

                <!-- Set Bilgileri -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Ağırlık (kg)</label>
                        <input type="number" id="weight-input" class="form-input" placeholder="0" min="0" step="0.5">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tekrar</label>
                        <input type="number" id="reps-input" class="form-input" placeholder="0" min="1">
                    </div>
                </div>

                <!-- Kaydet Butonu -->
                <button id="save-set-btn" class="btn btn-primary btn-full" onclick="saveSet()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    Set Kaydet
                </button>

                <!-- Bugünkü Setler -->
                <div id="current-session" class="current-session hidden">
                    <h3 class="session-title">📋 Bugünkü Setler</h3>
                    <div id="session-sets" class="session-sets">
                        <!-- JS ile doldurulacak -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ─── History Tab ─────────────────────────────────── -->
    <main id="tab-history" class="tab-content">
        <section class="section">
            <h2 class="section-title">
                <span class="title-icon">📊</span> İstatistikler & Geçmiş
            </h2>

            <!-- Kullanıcı Seçimi -->
            <div class="form-group">
                <label class="form-label">Kullanıcı</label>
                <div id="history-user-select" class="user-select-grid">
                    <!-- JS ile doldurulacak -->
                </div>
            </div>

            <!-- İstatistik Kartları -->
            <div id="stats-cards" class="stats-grid">
                <!-- JS ile doldurulacak -->
            </div>

            <!-- Egzersiz İlerleme -->
            <div class="form-group" style="margin-top: 2rem">
                <label class="form-label">Egzersiz İlerlemesi</label>
                <select id="progress-exercise" class="form-input form-select" onchange="loadProgress()">
                    <option value="">Egzersiz seç...</option>
                </select>
            </div>
            <div id="progress-chart-container" class="chart-container hidden">
                <canvas id="progress-chart"></canvas>
            </div>

            <!-- Antrenman Geçmişi Listesi -->
            <div id="workout-history" class="workout-history" style="margin-top: 2rem">
                <h3 class="session-title">📜 Son Antrenmanlar</h3>
                <div id="history-list" class="history-list">
                    <!-- JS ile doldurulacak -->
                </div>
            </div>
        </section>
    </main>

    <!-- ─── Toast Notification ──────────────────────────── -->
    <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
